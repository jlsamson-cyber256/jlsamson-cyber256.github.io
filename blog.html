<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding: 40px 0;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        nav {
            text-align: center;
            margin-bottom: 40px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 1.1em;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

        .blog-posts {
            display: grid;
            gap: 30px;
            margin-bottom: 50px;
        }

        .blog-post {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .blog-post:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .blog-post h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .blog-post-meta {
            color: #999;
            font-size: 0.95em;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .blog-post-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .blog-post-content {
            color: #333;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .read-more {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .read-more:hover {
            color: #764ba2;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px;
            opacity: 0.8;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 50px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 2em;
            }

            nav a {
                display: block;
                margin: 10px 0;
            }

            .blog-post {
                padding: 20px;
            }

            .blog-post h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My Blog</h1>
            <p>Thoughts, ideas, and insights</p>
        </header>

        <nav>
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>

        <div class="blog-posts">
            <!-- Blog posts will go here -->
            <div class="empty-state">
                <h2>🚀 Coming Soon!</h2>
                <p>Blog posts will appear here. Start writing your first post!</p>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 My Blog. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
