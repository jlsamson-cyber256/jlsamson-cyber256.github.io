<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    .pwd-display {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f5f5f0;
      border: 0.5px solid rgba(0,0,0,0.18);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 1.25rem;
    }

    .pwd-text {
      flex: 1;
      font-family: 'Courier New', Courier, monospace;
      font-size: 17px;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: 1px;
      word-break: break-all;
    }

    .copied-tag {
      font-size: 12px;
      color: #0f6e56;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #888;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .icon-btn:hover { color: #1a1a1a; }

    .strength-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: rgba(0,0,0,0.08);
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .ctrl-label {
      font-size: 14px;
      color: #666;
      min-width: 80px;
    }

    .ctrl-row input[type=range] {
      flex: 1;
      accent-color: #534AB7;
      cursor: pointer;
    }

    .ctrl-val {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      min-width: 24px;
      text-align: right;
    }

    .toggles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 0.75rem 0;
    }

    .toggle-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f5f5f0;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
      font-size: 13px;
      color: #666;
    }

    .toggle-pill.on {
      border-color: #378ADD;
      background: #E6F1FB;
      color: #185FA5;
    }

    .toggle-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .gen-btn {
      width: 100%;
      padding: 12px;
      border: 0.5px solid rgba(0,0,0,0.18);
      border-radius: 8px;
      background: #ffffff;
      color: #1a1a1a;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .gen-btn:hover { background: #f5f5f0; }
    .gen-btn:active { transform: scale(0.98); }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e8e8e4; }
      .card { background: #242422; border-color: rgba(255,255,255,0.1); }
      h1 { color: #e8e8e4; }
      .pwd-display { background: #2c2c2a; border-color: rgba(255,255,255,0.14); }
      .pwd-text { color: #e8e8e4; }
      .strength-bar { background: rgba(255,255,255,0.08); }
      .ctrl-label { color: #aaa; }
      .ctrl-val { color: #e8e8e4; }
      .toggle-pill { background: #2c2c2a; border-color: rgba(255,255,255,0.1); color: #aaa; }
      .toggle-pill.on { background: #0C447C; border-color: #378ADD; color: #B5D4F4; }
      .gen-btn { background: #242422; border-color: rgba(255,255,255,0.14); color: #e8e8e4; }
      .gen-btn:hover { background: #2c2c2a; }
      .icon-btn { color: #aaa; }
      .icon-btn:hover { color: #e8e8e4; }
      .strength-label { color: #aaa; }
      .copied-tag { color: #5DCAA5; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Password generator</h1>

    <div class="pwd-display">
      <span class="pwd-text" id="pwd">—</span>
      <span class="copied-tag" id="copied">Copied!</span>
      <button class="icon-btn" onclick="copyPwd()" title="Copy">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>

    <div class="strength-label" id="strength-label">—</div>
    <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>

    <div class="ctrl-row">
      <span class="ctrl-label">Length</span>
      <input type="range" min="8" max="32" value="14" step="1" id="length-slider" oninput="onLen(this.value)">
      <span class="ctrl-val" id="len-val">14</span>
    </div>

    <div class="toggles">
      <div class="toggle-pill on" id="t-upper" onclick="toggle('upper')"><span class="dot"></span>Uppercase</div>
      <div class="toggle-pill on" id="t-lower" onclick="toggle('lower')"><span class="dot"></span>Lowercase</div>
      <div class="toggle-pill on" id="t-num" onclick="toggle('num')"><span class="dot"></span>Numbers</div>
      <div class="toggle-pill on" id="t-sym" onclick="toggle('sym')"><span class="dot"></span>Symbols</div>
    </div>

    <button class="gen-btn" onclick="generate()">↻ Generate new password</button>
  </div>

  <script>
    const sets = {
      upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower: 'abcdefghijklmnopqrstuvwxyz',
      num: '0123456789',
      sym: '!#@?^*'
    };
    let flags = { upper: true, lower: true, num: true, sym: true };
    let length = 14;

    function onLen(v) {
      length = +v;
      document.getElementById('len-val').textContent = v;
      generate();
    }

    function toggle(k) {
      const active = Object.values(flags).filter(Boolean).length;
      if (flags[k] && active === 1) return;
      flags[k] = !flags[k];
      document.getElementById('t-' + k).classList.toggle('on', flags[k]);
      generate();
    }

    function generate() {
      const required = [];
      let pool = '';
      for (const k in flags) {
        if (flags[k]) {
          pool += sets[k];
          required.push(sets[k][Math.floor(Math.random() * sets[k].length)]);
        }
      }
      const arr = [...required];
      for (let i = arr.length; i < length; i++) arr.push(pool[Math.floor(Math.random() * pool.length)]);
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      const pwd = arr.join('');
      document.getElementById('pwd').textContent = pwd;
      updateStrength(pwd);
    }

    function updateStrength(pwd) {
      const typesUsed = [/[A-Z]/.test(pwd), /[a-z]/.test(pwd), /[0-9]/.test(pwd), /[!#@?^*]/.test(pwd)].filter(Boolean).length;
      let score = 0;
      if (pwd.length >= 8) score++;
      if (pwd.length >= 12) score++;
      if (pwd.length >= 16) score++;
      score += typesUsed;
      const pct = Math.min(100, Math.round(score / 7 * 100));
      const label = pct < 40 ? 'Weak' : pct < 65 ? 'Fair' : pct < 85 ? 'Strong' : 'Very strong';
      const color = pct < 40 ? '#E24B4A' : pct < 65 ? '#EF9F27' : pct < 85 ? '#1D9E75' : '#0F6E56';
      document.getElementById('strength-fill').style.width = pct + '%';
      document.getElementById('strength-fill').style.background = color;
      document.getElementById('strength-label').textContent = label;
    }

    function copyPwd() {
      const t = document.getElementById('pwd').textContent;
      if (t === '—') return;
      navigator.clipboard.writeText(t).then(() => {
        const el = document.getElementById('copied');
        el.style.opacity = 1;
        setTimeout(() => el.style.opacity = 0, 1500);
      });
    }

    generate();
  </script>
</body>
</html>
